apiVersion: v1
kind: Service
metadata:
  name: voice-server
  namespace: renfield
  labels:
    app.kubernetes.io/name: voice-server
    app.kubernetes.io/part-of: renfield
spec:
  selector:
    app.kubernetes.io/name: voice-server
  ports:
    - port: 8080
      targetPort: 8080
      name: http

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: voice-server-hf-cache
  namespace: renfield
  labels:
    app.kubernetes.io/name: voice-server
    app.kubernetes.io/part-of: renfield
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: voice-server
  namespace: renfield
  labels:
    app.kubernetes.io/name: voice-server
    app.kubernetes.io/part-of: renfield
spec:
  replicas: 1
  strategy:
    type: Recreate          # only one GPU on k8s-gpu-3, can't run two replicas
  selector:
    matchLabels:
      app.kubernetes.io/name: voice-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: voice-server
        app.kubernetes.io/part-of: renfield
    spec:
      nodeSelector:
        renfield.io/role: voice-llm
      imagePullSecrets:
        - name: harbor-pull-secret
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      securityContext:
        fsGroup: 1000
      containers:
        - name: voice-server
          image: registry.treehouse.x-idra.de/renfield/voice-server:v0.1.2
          # NOTE: until the release process pins immutable image digests,
          # use Always to avoid silently running a stale rebuild under the
          # same tag.
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: WHISPER_MODEL
              value: "Systran/faster-whisper-medium"
            - name: WHISPER_COMPUTE_TYPE
              value: "int8_float16"
            - name: WHISPER_DEVICE
              value: "cuda"
            - name: PIPER_VOICES_DIR
              value: "/mnt/llm/voice/piper"
            - name: PIPER_DEFAULT_VOICE_DE
              value: "de_DE-thorsten-medium"
            - name: PIPER_DEFAULT_VOICE_EN
              value: "en_US-amy-medium"
            - name: PIPER_USE_CUDA
              value: "true"
            - name: SPEAKER_MODEL_PATH
              value: "/mnt/llm/voice/ecapa_tdnn.onnx"
            - name: AUTH_MODE
              value: "local"
            # Match cluster posture: AUTH_ENABLED=false in backend means
            # household trusts the network and identifies users via voice
            # biometrics (speaker_resolver) + BLE presence (ha_glue), not
            # via JWT login. Voice-server skips token validation when
            # absent; a token IS still validated if present.
            - name: AUTH_REQUIRED
              value: "false"
            - name: HF_HUB_CACHE
              value: "/cache/huggingface"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: renfield-secrets
                  key: secret-key
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
              nvidia.com/gpu: 1
            limits:
              cpu: "6"
              memory: 12Gi
              nvidia.com/gpu: 1
          volumeMounts:
            - name: models
              mountPath: /mnt/llm
              readOnly: true
            - name: hf-cache
              mountPath: /cache
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 60        # ~10 min for first-pull of whisper-medium
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 600
            periodSeconds: 30
            failureThreshold: 5
      volumes:
        # NOTE: hostPath mirrors the existing llama-server.yaml pattern.
        # Cluster /mnt/llm is an NFS mount on each GPU node (see node
        # /etc/fstab). type: Directory means the path must exist at pod
        # start — if NFS is degraded after a reboot the pod will fail to
        # start and startupProbe cannot recover. Operational mitigation:
        # node fstab uses `_netdev,soft` so mount blocks reboot until
        # network is up. Migration to a real NFS PV is deferred —
        # cross-cutting change shared with llama-server, not B.1 scope.
        - name: models
          hostPath:
            path: /mnt/llm
            type: Directory
        - name: hf-cache
          persistentVolumeClaim:
            claimName: voice-server-hf-cache

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: voice-server
  namespace: renfield
  annotations:
    # Match the chat-WS ingress (renfield-https). Without
    # router.entrypoints + router.tls, Traefik does not bind this
    # route to the HTTPS listener, and wss://renfield.local/ws/voice
    # connections close abnormally (code 1006) before reaching the
    # voice-server pod. Discovered during the B.6 frontend flag-on
    # smoke test.
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    # /ws/voice (this ingress) and /ws (renfield-https) both match
    # paths under /ws/voice. Priority 100 makes the longer-match win
    # (auto-priority based on rule length sometimes ties). Verified
    # by curl after the cluster has an IngressClass resource OR the
    # ingressClassName field is omitted (this cluster has neither —
    # Traefik runs in default-class mode and only picks up Ingresses
    # without an explicit class).
    traefik.ingress.kubernetes.io/router.priority: "100"
spec:
  # NOT setting `ingressClassName: traefik` here. The cluster has no
  # `IngressClass` resource named "traefik", so any Ingress that
  # explicitly requests it is ignored by Traefik (which picks up
  # only no-class ingresses by default — confirmed by inspecting the
  # working `renfield-https` ingress and Traefik's `/api/http/routers`).
  rules:
    - host: renfield.local
      http:
        paths:
          - path: /ws/voice
            pathType: Prefix
            backend:
              service:
                name: voice-server
                port:
                  number: 8080
  tls:
    - hosts:
        - renfield.local
      secretName: renfield-tls
