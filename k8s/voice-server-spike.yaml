# B.5 spike Deployment.
#
# Replaces the production voice-server pod for the duration of the
# maintenance window per docs/B5_PLAN.md Step 6. The procedure:
#
#   1. kubectl scale -n renfield deploy/voice-server --replicas=0
#   2. kubectl apply -f k8s/voice-server-spike.yaml
#   3. (run benchmark, copy results out)
#   4. kubectl delete -f k8s/voice-server-spike.yaml
#   5. kubectl scale -n renfield deploy/voice-server --replicas=1
#
# This file ONLY defines a Deployment. The production Service
# `voice-server` (in voice-server.yaml) selects on
# `app.kubernetes.io/name: voice-server` — the spike pod carries the
# same label, so the existing Service + Ingress route to it once
# production is at 0 replicas. No new Service/Ingress needed.
#
# The PVC `voice-server-hf-cache` is also reused — same volume,
# same mount path. Whisper-medium stays cached, XTTS-v2 downloads on
# first benchmark request (or pre-pulled via predownload_xtts.py).
#
# DELETE this file after the swap-or-stay decision in Step 8 — it has
# no production purpose.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: voice-server-spike
  namespace: renfield
  labels:
    # Same label so the production Service selector matches us.
    app.kubernetes.io/name: voice-server
    app.kubernetes.io/part-of: renfield
    app.kubernetes.io/variant: spike-b5
spec:
  replicas: 1
  strategy:
    type: Recreate          # only one GPU on k8s-gpu-3, can't run two replicas
  selector:
    matchLabels:
      app.kubernetes.io/name: voice-server
      app.kubernetes.io/variant: spike-b5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: voice-server
        app.kubernetes.io/part-of: renfield
        app.kubernetes.io/variant: spike-b5
    spec:
      nodeSelector:
        renfield.io/role: voice-llm
      imagePullSecrets:
        - name: harbor-pull-secret
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      securityContext:
        fsGroup: 1000
      containers:
        - name: voice-server
          image: registry.treehouse.x-idra.de/renfield/voice-server:b5-spike-rc1
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            # ── identical to production voice-server ────────────────
            - name: WHISPER_MODEL
              value: "Systran/faster-whisper-medium"
            - name: WHISPER_COMPUTE_TYPE
              value: "int8_float16"
            - name: WHISPER_DEVICE
              value: "cuda"
            - name: PIPER_VOICES_DIR
              value: "/mnt/llm/voice/piper"
            - name: PIPER_DEFAULT_VOICE_DE
              value: "de_DE-thorsten-medium"
            - name: PIPER_DEFAULT_VOICE_EN
              value: "en_US-amy-medium"
            - name: PIPER_USE_CUDA
              value: "true"
            - name: SPEAKER_MODEL_PATH
              value: "/mnt/llm/voice/ecapa_tdnn.onnx"
            - name: AUTH_MODE
              value: "local"
            - name: AUTH_REQUIRED
              value: "false"
            - name: HF_HUB_CACHE
              value: "/cache/huggingface"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: renfield-secrets
                  key: secret-key
            # ── B.5 spike-only ──────────────────────────────────────
            # Flips on XTTSService construction in main.py. The
            # Dockerfile already sets these via ENV, but we mirror them
            # here so a bare `docker run` of the same image and a
            # `kubectl apply` produce identical behaviour.
            - name: XTTS_ENABLED
              value: "true"
            - name: COQUI_TOS_AGREED
              value: "1"
            # Coqui TTS' default cache is ~/.local/share/tts/ — that
            # lives on ephemeral storage and the XTTS-v2 model + its
            # downloads bloat it past the node's threshold (discovered
            # mid-window 2026-05-07: pod was Evicted with DiskPressure
            # after using 1.5 GB). Redirect to the Longhorn PVC mount.
            - name: TTS_HOME
              value: "/cache/coqui-tts"
            - name: HOME
              value: "/cache/coqui-tts-home"
            # XTTS clone voice reference. Production NFS (/mnt/llm) is
            # mounted readOnly per the production manifest, so we cannot
            # write thorsten_ref.wav there. Phase 2.1 of the runbook
            # generates the clip inside the prod voice-server pod, copies
            # it out to local, and creates a ConfigMap (xtts-thorsten-ref).
            # The ConfigMap is mounted below at /etc/xtts-ref/, and this
            # env override points the xtts service at it.
            - name: XTTS_CLONE_VOICE_REF
              value: "/etc/xtts-ref/thorsten_ref.wav"
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
              nvidia.com/gpu: 1
              # Reserve ephemeral so the kubelet's eviction logic doesn't
              # surprise-evict us. The XTTS-v2 spike turned out to use
              # ~1.5 GiB even with TTS_HOME redirected (transient downloads,
              # ONNX session caches, /tmp scratch). 4 GiB is plenty.
              ephemeral-storage: 4Gi
            limits:
              cpu: "6"
              # +4 GiB vs production: XTTS-v2 + GPU torch + librosa pulls
              # more host RAM than the Piper-only image. Headroom; not a
              # measured tight number.
              memory: 16Gi
              nvidia.com/gpu: 1
              ephemeral-storage: 8Gi
          volumeMounts:
            - name: models
              mountPath: /mnt/llm
              readOnly: true
            - name: hf-cache
              mountPath: /cache
            - name: xtts-ref
              mountPath: /etc/xtts-ref
              readOnly: true
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            # Spike image first-pull from Harbor + GPU-torch warmup is
            # heavier than v0.1.5; give it 15 min instead of 10.
            failureThreshold: 90
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 600
            periodSeconds: 30
            failureThreshold: 5
      volumes:
        - name: models
          hostPath:
            path: /mnt/llm
            type: Directory
        - name: hf-cache
          persistentVolumeClaim:
            claimName: voice-server-hf-cache
        - name: xtts-ref
          configMap:
            name: xtts-thorsten-ref
            # Single-key map; default mount layout creates
            # /etc/xtts-ref/thorsten_ref.wav.
            items:
              - key: thorsten_ref.wav
                path: thorsten_ref.wav
