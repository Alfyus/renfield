apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: renfield
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/part-of: renfield
spec:
  selector:
    app.kubernetes.io/name: ollama
  ports:
    - port: 11434
      targetPort: 11434

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: renfield
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/part-of: renfield
spec:
  # Shared small-models tier for Reva + Renfield (2026-05-13).
  #
  # Hosts four small models that don't justify llama-server's per-model
  # process overhead but benefit from GPU inference:
  #   - llama3.2:3b           ~2 GB  — Reva router, Renfield intent fallback
  #   - qwen3:8b              ~5 GB  — Renfield intent
  #   - qwen3-embedding:4b    ~3 GB  — Renfield embeddings (shared with
  #                                    legacy llama-server-embed until that's
  #                                    retired; see follow-up note)
  #   - nomic-embed-text     ~0.5 GB — Reva embeddings
  # Total resident: ~10 GB.
  #
  # Pinned to k8s-gpu-1 (5070 Ti + 5060 Ti, 32 GB combined). Claims one
  # GPU; the other stays free for the idle llama-server-agent Q4 model
  # (replicas=0 in steady state) when failover is needed.
  #
  # See reva/docs/architecture/gpu-allocation.md for the cluster layout.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: ollama
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ollama
        app.kubernetes.io/part-of: renfield
    spec:
      nodeSelector:
        kubernetes.io/hostname: k8s-gpu-1
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: ollama
          image: ollama/ollama:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 11434
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
            - name: OLLAMA_MODELS
              value: /root/.ollama/models
            - name: OLLAMA_KEEP_ALIVE
              value: "30m"
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          readinessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
              nvidia.com/gpu: 1
            limits:
              cpu: "6"
              memory: 16Gi
              nvidia.com/gpu: 1
      volumes:
        - name: models
          hostPath:
            path: /mnt/llm/.ollama
            type: Directory

---
# One-shot Job: pre-pull models missing from NFS so first backend requests don't stall.
apiVersion: batch/v1
kind: Job
metadata:
  name: ollama-model-prepull
  namespace: renfield
  labels:
    app.kubernetes.io/part-of: renfield
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-ollama
          image: curlimages/curl:8.10.1
          command: ["sh", "-c"]
          args:
            - |
              until curl -fsS http://ollama:11434/ > /dev/null; do
                echo "waiting for ollama..."
                sleep 3
              done
              echo "ollama ready"
      containers:
        - name: prepull
          image: curlimages/curl:8.10.1
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -euo pipefail
              # Pre-pull the four small models hosted on this Ollama:
              # router (Reva), intent (Renfield), embeddings for both.
              for m in llama3.2:3b qwen3:8b qwen3-embedding:4b nomic-embed-text; do
                echo "Pulling $m ..."
                code=$(curl -sS -o /tmp/out -w '%{http_code}' -X POST http://ollama:11434/api/pull \
                  -H 'Content-Type: application/json' \
                  --max-time 1800 \
                  -d "{\"model\":\"$m\",\"stream\":false}")
                echo "HTTP $code"
                tail -c 400 /tmp/out; echo
                [ "$code" = "200" ] || exit 1
              done
              echo "Done."
